# ==========================================================
# nginx config cho ERP Framework SPA
# - SPA fallback: mọi route không phải file → index.html
#   (cần cho TanStack Router client-side routing)
# - Cache asset có hash; không cache index.html
# ==========================================================
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Asset có hash trong tên → cache lâu
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # index.html không cache → luôn lấy bản mới
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # SPA fallback — mọi path khác trả index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
