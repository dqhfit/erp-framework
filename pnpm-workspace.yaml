packages:
  - 'packages/*'
  - 'apps/*'
  - 'tooling/*'

# pnpm 10.6+/11: build scripts của dependency bị chặn mặc định.
# Phải khai báo TẠI ĐÂY (không phải package.json#pnpm) cho workspace —
# nếu không, pnpm install báo ERR_PNPM_IGNORED_BUILDS và thoát mã 1.
# esbuild + @swc/core cần postinstall để cài binary native cho vite build.
onlyBuiltDependencies:
  - '@biomejs/biome'
  - '@swc/core'
  - esbuild
  - isolated-vm

# pnpm 11: settings doi tu package.json#pnpm + .npmrc sang DAY. Policy
# "minimum-release-age" chan cai package vua publish (chong supply-chain
# attack: ban compromise duoc go nhanh khi chua kip phat hien). Giu cua
# so 24h cho TOAN BO dep, chi mo ngoai le cho @anthropic-ai/claude-agent-sdk
# (+ binary theo nen) vi tooling migration can uptake nhanh -> neu khong
# se vo CI/Docker build moi khi SDK ra ban moi. (.npmrc khong con duoc
# pnpm 11 doc cho setting nay.)
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@anthropic-ai/claude-agent-sdk'
  - '@anthropic-ai/claude-agent-sdk-*'

# pnpm 11 KHONG con doc package.json#pnpm.overrides -> frozen install bao
# ERR_PNPM_LOCKFILE_CONFIG_MISMATCH (lockfile co overrides, config thi
# khong). Phai khai bao TAI DAY. Va CVE patch transitive (bai hoc #6).
# Giu ban sao o package.json#pnpm cho pnpm 10 local; gia tri phai trung.
overrides:
  esbuild: ^0.25.0
  vite: ^6.4.2

allowBuilds:
  '@swc/core': set this to true or false
  esbuild: set this to true or false
  puppeteer: set this to true or false
