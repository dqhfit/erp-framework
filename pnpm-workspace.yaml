packages:
  - 'packages/*'
  - 'apps/*'
  - 'tooling/*'

# pnpm 10.6+/11: build scripts của dependency bị chặn mặc định.
# Phải khai báo TẠI ĐÂY (không phải package.json#pnpm) cho workspace —
# nếu không, pnpm install báo ERR_PNPM_IGNORED_BUILDS và thoát mã 1.
# esbuild + @swc/core cần postinstall để cài binary native cho vite build.
onlyBuiltDependencies:
  - '@biomejs/biome'
  - '@swc/core'
  - esbuild
  - isolated-vm

# pnpm 11: settings doi tu package.json#pnpm + .npmrc sang DAY. Policy
# "minimum-release-age" (mac dinh ~24h) chan cai package vua publish ->
# vo CI/Docker build moi khi dependency moi len npm (vd claude-agent-sdk).
# Dat 0 de tat. (.npmrc khong con duoc pnpm 11 doc cho setting nay.)
minimumReleaseAge: 0

# pnpm 11 KHONG con doc package.json#pnpm.overrides -> frozen install bao
# ERR_PNPM_LOCKFILE_CONFIG_MISMATCH (lockfile co overrides, config thi
# khong). Phai khai bao TAI DAY. Va CVE patch transitive (bai hoc #6).
# Giu ban sao o package.json#pnpm cho pnpm 10 local; gia tri phai trung.
overrides:
  esbuild: ^0.25.0
  vite: ^6.4.2
