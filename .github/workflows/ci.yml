# CI — typecheck + build + test + e2e cho ERP Framework (monorepo pnpm).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cài pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
      - name: Cài Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # --ignore-scripts: pnpm 11 chặn build script dependency và coi là
      # lỗi khi chạy không tương tác. esbuild/@swc/core nạp binary qua
      # optionalDependencies nên vẫn hoạt động.
      - name: Cài dependency
        run: pnpm install --ignore-scripts
      - name: Build app (sinh routeTree.gen.ts)
        run: pnpm exec vite build
      - name: Typecheck toàn monorepo
        run: pnpm -r typecheck
      - name: Test
        run: pnpm -r test
      # Lint Biome — hiện còn ~153 pre-existing a11y/useButtonType errors,
      # tạm continue-on-error để surface diagnostics mà không block CI.
      # Sprint cleanup riêng sẽ siết về fail-on-error.
      - name: Lint (Biome, soft-fail)
        run: pnpm lint
        continue-on-error: true

  migration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cài Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Kiểm tra _journal.json (không có duplicate idx/when)
        run: node tooling/check-journal.mjs

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cài pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
      - name: Cài Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Cài dependency
        run: pnpm install --ignore-scripts
      - name: Cài trình duyệt Playwright
        run: pnpm exec playwright install --with-deps chromium
      # e2e smoke chạy với app-only (pnpm dev:app) — không cần DB/server.
      - name: Chạy e2e smoke
        run: pnpm e2e

  e2e-full:
    runs-on: ubuntu-latest
    # e2e full-stack: PostgreSQL + server + app thật.
    services:
      postgres:
        # pgvector/pgvector:pg18 — cần cho migration 0007 (CREATE EXTENSION vector).
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: erp
          POSTGRES_PASSWORD: erp
          POSTGRES_DB: erp_framework
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U erp -d erp_framework"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgres://erp:erp@localhost:5432/erp_framework
      ENCRYPTION_KEY: e2e-ci-encryption-key-not-secret
    steps:
      - uses: actions/checkout@v4
      - name: Cài pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
      - name: Cài Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Cài dependency
        run: pnpm install --ignore-scripts
      - name: Cài trình duyệt Playwright
        run: pnpm exec playwright install --with-deps chromium
      # pnpm e2e:full tự migrate + seed trước khi chạy Playwright.
      - name: Chạy e2e full-stack
        run: pnpm e2e:full
