# CI — typecheck + build + test cho ERP Framework (monorepo pnpm).
# Bắt lỗi type sớm: pnpm -r typecheck KHÔNG phủ app gốc nếu thiếu
# routeTree.gen.ts, nên build app trước rồi mới typecheck toàn bộ.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cài pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Cài Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # --ignore-scripts: pnpm 11 chặn build script dependency (esbuild,
      # @swc/core, biome) và coi là lỗi khi chạy không tương tác. Các gói
      # này nạp binary qua optionalDependencies nên vẫn hoạt động.
      - name: Cài dependency
        run: pnpm install --ignore-scripts

      - name: Build app (sinh routeTree.gen.ts)
        run: pnpm exec vite build

      - name: Typecheck toàn monorepo
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test
