# =============================================================
# Triển khai ERP Framework lên Coolify như MỘT dịch vụ (Docker
# Compose). Trong Coolify: + New Resource → Service → Docker
# Compose Empty → trỏ repo này, Compose Path = file này.
# Coolify tự sinh FQDN, mật khẩu, khoá mã hoá qua biến SERVICE_*.
# Hướng dẫn chi tiết: docs/COOLIFY.md.
# =============================================================

services:
  db:
    # pgvector/pgvector:pg18 — PostgreSQL 18 + extension pgvector
    # cài sẵn (migration 0007 cần `CREATE EXTENSION vector`).
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_64_DB}
      POSTGRES_DB: erp_framework
    volumes:
      # PG 18+ store data ở /var/lib/postgresql/<major>/data (subdir theo
      # version để hỗ trợ pg_upgrade --link). Mount parent /var/lib/postgresql
      # — KHÔNG mount /var/lib/postgresql/data như PG 16/17. Image sẽ
      # complain "PostgreSQL data in /var/lib/postgresql/data (unused
      # mount/volume)" và refuse boot nếu vẫn mount path cũ.
      # Ref: https://github.com/docker-library/postgres/pull/1259
      - erp-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp_framework"]
      interval: 5s
      timeout: 5s
      retries: 30
      # PG 18 init lần đầu (initdb + tạo user + CREATE EXTENSION vector)
      # chậm hơn 16/17 đáng kể. Cho 90s grace để tránh "Error" giả.
      start_period: 90s

  # Apache Tika — sidecar trích văn bản từ file cho Knowledge Base
  # (PDF/DOCX/XLSX/PPTX/TXT + ảnh OCR + scan PDF). Không expose ra Internet.
  # Bản -full ~2GB: bao gồm Tesseract OCR + bộ font đầy đủ → đọc được
  # PDF scan, ảnh JPG/PNG có chữ, file có ký tự CJK/Việt. Pull lần đầu
  # chậm — recommend pre-pull trên Coolify host:
  #   docker pull apache/tika:3.2.1.0-full
  tika:
    image: apache/tika:3.2.1.0-full
    restart: unless-stopped
    expose:
      - "9998"
    # Tika expose /tika trả "This is Tika Server (Apache Tika x.y.z)…".
    # Image dựa trên eclipse-temurin có wget sẵn. start_period 60s vì
    # JVM warm-up lần đầu + load font/OCR (bản -full) chậm.
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9998/tika"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  server:
    # Coolify chạy `docker compose --project-directory <repo-root>` →
     # build.context relative theo project-directory, KHÔNG theo vị trí
     # compose file. Phải dùng "." (repo root) thay vì ".." (parent).
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://erp:${SERVICE_PASSWORD_64_DB}@db:5432/erp_framework
      PORT: "8910"
      HOST: 0.0.0.0
      NODE_ENV: production
      # ENCRYPTION_KEY — mã hoá API key LLM/sensitive lưu trong DB
      # (AES-256-GCM). Coolify giữ ổn định qua mọi lần redeploy —
      # KHÔNG đổi sau khi đã có dữ liệu mã hoá.
      ENCRYPTION_KEY: ${SERVICE_BASE64_64_KEY}
      # Server fail-fast ở production nếu thiếu CORS_ORIGIN.
      # SERVICE_FQDN_APP là URL HTTPS công khai Coolify cấp cho "app".
      CORS_ORIGIN: ${SERVICE_FQDN_APP}
      TIKA_URL: http://tika:9998
      UPLOAD_DIR: /data/uploads
      # MQTT bridge — server subscribe topic IoT (nội bộ, mosquitto:1883).
      MQTT_URL: mqtt://mosquitto:1883
      # Claude Code CLI bridge — server-side gọi adapter=claude-cli qua tên
      # service "bridge" (browser dùng /bridge proxy; server không parse được).
      BRIDGE_URL: http://bridge:8909
      # Ollama embedding endpoint. Đặt OLLAMA_EMBED_URL để trỏ sang máy khác
      # (mạnh hơn/GPU) khi server yếu — vd http://192.168.1.50:11434.
      OLLAMA_EMBED_URL: ${OLLAMA_EMBED_URL:-http://ollama:11434}
    depends_on:
      db:
        condition: service_healthy
      tika:
        condition: service_started
      mosquitto:
        condition: service_started
    volumes:
      - erp-uploads:/data/uploads
    # Chỉ expose nội bộ — nginx (app) proxy /trpc → server:8910.
    expose:
      - "8910"
    # GET /health trả {ok:true,ts}. Node 22 có fetch global → không cần
    # curl/wget (node:22-slim không có). start_period 120s vì lần đầu
    # phải chạy migration 0000-0012 + seed CEO/ERP trước khi listen.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8910/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    restart: unless-stopped
    # Chờ server healthy (đã migrate xong + seed xong + listen :8910)
    # trước khi nginx start, tránh user vào sớm gặp 502 lúc proxy /trpc.
    depends_on:
      server:
        condition: service_healthy
    environment:
      # Khai báo biến này → Coolify cấp FQDN HTTPS + route Traefik
      # tới cổng 80 của nginx. Đây là cửa ra DUY NHẤT của dịch vụ.
      # Coolify đọc healthcheck dưới để mark deployment "live".
      - SERVICE_FQDN_APP_80
    # Attach app vào CẢ network mặc định (giao tiếp nội bộ với server/
    # bridge/tika...) VÀ network `coolify` chia sẻ toàn cluster, nơi
    # Traefik (coolify-proxy) sẵn sàng nhận traffic.
    networks:
      - default
      - coolify
    labels:
      - "traefik.docker.network=coolify"
      - "traefik.http.services.https-0-bnz7uw5qok10rxqqe9tat1cx-app.loadbalancer.server.port=80"
    # Traefik cần thấy `expose` để biết forward sang cổng nào.
    expose:
      - "80"
    # nginx:1.27-alpine có wget (busybox). Dùng 127.0.0.1 thay vì
    # localhost — nginx config chỉ `listen 80` (IPv4), localhost
    # resolve thành ::1 (IPv6) trên container → healthcheck fail dù
    # nginx thực tế đang serve.
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Claude Code CLI Bridge — dùng `claude` CLI làm nguồn LLM (auth
  # subscription Pro/Max thay cho API token). Đăng nhập MỘT LẦN sau
  # khi container chạy qua Terminal trong Coolify:
  #   docker exec -it <id-bridge> claude
  # → mở URL OAuth ở trình duyệt local → đăng nhập. Token lưu vào
  # volume bridge-data, persist qua mọi lần redeploy.
  # KHÔNG expose ra Internet — nginx (app) proxy /bridge → bridge:8909.
  bridge:
    build:
      context: .
      dockerfile: docker/Dockerfile.bridge
    restart: unless-stopped
    volumes:
      - bridge-data:/data
    expose:
      - "8909"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8909/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Ollama — sinh embedding cục bộ cho Knowledge Base. Server gọi
  # nội bộ http://ollama:11434 (cấu hình trong app → Cài đặt →
  # Embedding). Model nomic-embed-text (768 chiều, ~275MB).
  # KHÔNG expose ra Internet.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    expose:
      - "11434"
    # Ollama image KHÔNG có curl/wget/nc — chỉ có bash + binary ollama.
    # `ollama list` tự gọi http://localhost:11434/api/tags qua client
    # nội bộ → exit 0 khi API up, exit !=0 khi server chưa sẵn sàng.
    # Đúng pattern mà ollama-pull entrypoint cũng dùng.
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # MQTT broker — IoT realtime push/pull. Nội bộ Docker network,
  # KHÔNG expose ra Internet trong template này (security). Thiết bị
  # ngoài cloud nên dùng REST /iot/v1/telemetry qua HTTPS (cùng FQDN
  # với app). Cần MQTT public: thêm SERVICE_FQDN_MQTT_1883 + cấu hình
  # auth thay cho allow_anonymous.
  #
  # Cấu hình mosquitto inline qua entrypoint (heredoc → file) thay vì
  # bind-mount ./docker/mosquitto.conf hay Docker `configs:` (yêu cầu
  # Compose 2.23+, không chắc Coolify có).
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    entrypoint:
      - sh
      - -c
      - |
        cat > /mosquitto/config/mosquitto.conf <<'CONF'
        listener 1883 0.0.0.0
        allow_anonymous true
        persistence true
        persistence_location /mosquitto/data/
        log_dest stdout
        log_type error
        log_type warning
        log_type notice
        CONF
        exec mosquitto -c /mosquitto/config/mosquitto.conf
    volumes:
      - mosquitto-data:/mosquitto/data
    expose:
      - "1883"
    # TCP probe đơn giản — eclipse-mosquitto:2 alpine có nc sẵn. Chỉ
    # check port 1883 listening, không full MQTT handshake. Đủ cho mục
    # đích Coolify nhận biết broker up. Tránh edge case với mosquitto_sub
    # subscribe wildcard topic system ($SYS) trên một số deploy.
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "1883"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Một-lần: chờ ollama sẵn sàng rồi kéo model nomic-embed-text.
  # Container thoát 0 sau khi xong; redeploy chỉ kiểm tra nhanh
  # (model đã trong volume).
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - /bin/sh
      - -c
      - "until ollama list >/dev/null 2>&1; do echo 'cho ollama...'; sleep 2; done; ollama pull nomic-embed-text"
    restart: "no"

volumes:
  erp-pgdata:
  erp-uploads:
  bridge-data:
  ollama-data:
  mosquitto-data:

# `coolify` là network shared toàn cluster Coolify, đã tồn tại sẵn,
# coolify-proxy (Traefik) đã join. App attach vào đây để Traefik có
# đường route tường minh tới cổng 80 nginx. `default` (network tự sinh
# của project) vẫn dùng cho giao tiếp nội bộ với server/bridge/tika.
networks:
  coolify:
    external: true
    name: coolify
