# Self-host đầy đủ ERP Framework: PostgreSQL 18 (pgvector) + server + app
# (nginx) + Apache Tika + bridge.
# Chạy:  docker compose -f docker/docker-compose.yml up -d --build
# Truy cập:  http://localhost:3000   (nginx phục vụ SPA, proxy /trpc → server)

# Tên project Compose — gom container vào nhóm "erp-framework". Mặc định
# Compose lấy tên theo thư mục chứa file compose ("docker"); khai báo
# tường minh để tên nhóm rõ nghĩa (container: erp-framework-db-1…).
name: erp-framework

services:
  db:
    # pgvector/pgvector:pg18 = PostgreSQL 18 + extension pgvector cài sẵn
    # (Knowledge Base cần `CREATE EXTENSION vector` — xem migration 0007).
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp_framework
    ports:
      # Mở cổng ra host để công cụ dev kết nối: drizzle-kit migrate,
      # pnpm dev (server chạy trên host), psql…
      # Cổng host lấy từ biến ERP_DB_PORT (mặc định 5433). `pnpm db:setup`
      # tự dò cổng trống và đặt biến này để tránh đụng cổng.
      - "${ERP_DB_PORT:-5433}:5432"
    volumes:
      - erp-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp_framework"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s

  # Apache Tika — sidecar trích văn bản từ file cho Knowledge Base.
  # Bản `-full` kèm Tesseract OCR + đủ parser (PDF/DOCX/XLSX/PPTX/HTML…).
  # Không healthcheck: image dựa trên JRE tối giản, không chắc có wget/curl;
  # worker kb-ingest tự xử lý khi Tika chưa sẵn sàng (đặt status=error).
  tika:
    image: apache/tika:3.2.1.0-full
    restart: unless-stopped
    # Mở cổng ra host để dev (server chạy trên host) gọi được.
    ports:
      - "${ERP_TIKA_PORT:-9998}:9998"
    expose:
      - "9998"

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://erp:erp@db:5432/erp_framework
      PORT: "8910"
      HOST: 0.0.0.0
      NODE_ENV: production
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-please-change-this-encryption-key}
      # CORS — server kiểm fail-fast ở production (bắt buộc khai báo).
      # Trình duyệt gọi nginx (cùng origin) nên giá trị này chủ yếu để
      # qua cửa kiểm; đặt theo domain thật khi mở ra ngoài Internet.
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      # Knowledge Base — sidecar Tika + thư mục lưu file tải lên.
      TIKA_URL: http://tika:9998
      UPLOAD_DIR: /data/uploads
      # MQTT bridge cho IoT — server subscribe iot/+/telemetry/+ + ack/+.
      MQTT_URL: mqtt://mosquitto:1883
      # Claude Code CLI bridge — server-side gọi LLM adapter=claude-cli.
      # Bắt buộc tên service "bridge" (không phải localhost) vì server ở
      # trong Docker. Override profile.endpoint phía browser. Local dev
      # (server chạy ngoài Docker) không set biến này → fallback localhost.
      BRIDGE_URL: http://bridge:8909
      # Ollama embedding endpoint cho server. Mặc định service nội bộ
      # (ollama:11434). Đặt OLLAMA_EMBED_URL trong docker/.env để trỏ sang
      # MÁY KHÁC mạnh hơn/có GPU khi server không kham nổi embedding CPU —
      # vd OLLAMA_EMBED_URL=http://192.168.1.50:11434 (máy đó cần
      # OLLAMA_HOST=0.0.0.0 + đã pull nomic-embed-text).
      OLLAMA_EMBED_URL: ${OLLAMA_EMBED_URL:-http://ollama:11434}
    depends_on:
      db:
        condition: service_healthy
      tika:
        condition: service_started
      mosquitto:
        condition: service_started
    volumes:
      - erp-uploads:/data/uploads
    # Không expose ra ngoài — app (nginx) proxy nội bộ qua /trpc.
    # Mở dòng dưới nếu cần gọi thẳng server để debug.
    # ports:
    #   - "8910:8910"
    expose:
      - "8910"

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "3000:80"

  # Claude Code CLI Bridge — dùng claude CLI làm nguồn LLM (auth Pro/Max).
  # Đăng nhập MỘT LẦN sau khi container chạy (credentials lưu vào volume
  # claude-auth, không mất khi restart):
  #   docker compose -f docker/docker-compose.yml exec -it bridge claude
  # Trong app (browser) → Cài đặt LLM → Bridge URL = http://localhost:8909
  # (hoặc "/bridge" qua nginx proxy). Server-side KHÔNG dùng giá trị này —
  # nó đọc env BRIDGE_URL=http://bridge:8909 (xem service server).
  bridge:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bridge
    restart: unless-stopped
    ports:
      - "8909:8909"
    volumes:
      # Một volume giữ TẤT CẢ trạng thái: phiên đăng nhập claude CLI
      # (/data/claude) + config storage của bridge (/data/bridge).
      - bridge-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8909/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Ollama — sinh embedding cục bộ cho Knowledge Base. Chạy chung với
  # stack khi deploy. Model nhẹ nomic-embed-text (~275MB, chạy CPU tốt)
  # do service ollama-pull tự kéo về. Trong app → Cài đặt → Embedding
  # đặt endpoint = http://ollama:11434
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    # Mở cổng ra host để dev (server chạy trên host) cũng gọi được.
    ports:
      - "${ERP_OLLAMA_PORT:-11434}:11434"
    expose:
      - "11434"

  # Một-lần: chờ ollama sẵn sàng rồi kéo model embedding, xong thì thoát.
  # Idempotent — lần deploy sau model đã nằm trong volume, pull chỉ kiểm
  # tra nhanh. Container này hiện trạng thái Exited(0) sau khi xong.
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - /bin/sh
      - -c
      - "until ollama list >/dev/null 2>&1; do echo 'cho ollama...'; sleep 2; done; ollama pull nomic-embed-text"
    restart: "no"

  # MQTT broker — IoT devices publish telemetry, server subscribe;
  # commands gửi ngược lại qua iot/<deviceId>/cmd/<id>. Mở cổng 1883
  # ra host để thiết bị ngoài LAN kết nối được.
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    ports:
      - "${ERP_MQTT_PORT:-1883}:1883"
    expose:
      - "1883"

volumes:
  erp-pgdata:
  bridge-data:
  erp-uploads:
  ollama-data:
  mosquitto-data:
