# =============================================================
# HA TANG DEV tren Coolify (LINK PUBLIC QUA TEN MIEN) — cho may
# dev KHONG cai duoc Docker. Chi deploy ha tang (DB + sidecar);
# server + app VAN chay tren may dev qua `pnpm dev`.
#
# MO HINH KET NOI: tat ca qua A-record subdomain -> IP server +
# port rieng (Postgres KHONG di qua Traefik 443 duoc — xem CLAUDE.md
# muc dev khong-Docker). Tao cac A-record tro ve IP server Coolify:
#   db.dev.vfmgroup.vn      -> <IP>   (Postgres 5432, co TLS)
#   tika.dev.vfmgroup.vn    -> <IP>   (Tika 9998)
#   ollama.dev.vfmgroup.vn  -> <IP>   (Ollama 11434)
#   mqtt.dev.vfmgroup.vn    -> <IP>   (MQTT 1883)
#
# Coolify: + New Resource -> Service -> Docker Compose Empty ->
#   Compose Path = docker/docker-compose.dev-infra.yaml
#
# ┌─ BAO MAT — BAT BUOC (cac service nay mo ra Internet) ───────┐
# │ 1. FIREWALL ALLOWLIST tren server Coolify — chi cho IP cua  │
# │    may dev toi cac port. Compose KHONG tu lam duoc viec nay:│
# │      ufw allow from <dev-ip> to any port 5432               │
# │      ufw allow from <dev-ip> to any port 9998               │
# │      ufw allow from <dev-ip> to any port 11434              │
# │      ufw allow from <dev-ip> to any port 1883               │
# │    Tika/Ollama KHONG co auth san -> allowlist la lop bao ve │
# │    chinh. Khong allowlist = bat ky ai cung dung duoc.       │
# │ 2. Postgres: da bat TLS (cert tu ky) + scram-sha-256 + mat  │
# │    khau 64 ky tu (Coolify SERVICE_PASSWORD_64_DB).          │
# │ 3. MQTT: da tat allow_anonymous, dung mat khau (SERVICE_    │
# │    PASSWORD_64_MQTT). Dev noi mqtt://dev:<pw>@host:1883.    │
# │ 4. user DB `erp` la superuser (migrate can CREATE EXTENSION │
# │    vector). Muon chat hon: tao role app non-superuser rieng │
# │    (xem ghi chu duoi service db).                           │
# └────────────────────────────────────────────────────────────┘
# =============================================================

services:
  # ── Sinh cert tu ky cho Postgres TLS (mot-lan) ──────────────
  # postgres image khong chac co openssl CLI -> dung alpine sinh cert
  # vao volume dung chung. chown 999 = uid postgres trong image.
  db-cert:
    image: alpine:3.20
    restart: "no"
    environment:
      DB_CN: db.dev.vfmgroup.vn
    entrypoint:
      - sh
      - -c
      - |
        set -e
        if [ ! -f /certs/server.key ]; then
          apk add --no-cache openssl >/dev/null
          openssl req -new -x509 -days 3650 -nodes \
            -subj "/CN=$${DB_CN}" -addext "subjectAltName=DNS:$${DB_CN}" \
            -out /certs/server.crt -keyout /certs/server.key
          chmod 600 /certs/server.key
          chown 999:999 /certs/server.key /certs/server.crt
          echo "OK: da sinh cert tu ky cho $${DB_CN}"
        else
          echo "cert da co — bo qua"
        fi
    volumes:
      - pg-certs:/certs

  # ── Postgres 18 + pgvector (BAT BUOC) — TLS + scram ─────────
  db:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    depends_on:
      db-cert:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: erp
      # Coolify tu sinh 64 ky tu, on dinh qua moi redeploy.
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_64_DB}
      POSTGRES_DB: erp_framework
      # Ep scram-sha-256 cho ket noi mang (chi co tac dung khi initdb
      # lan dau — volume moi).
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    # Bat TLS bang cert tu db-cert. Cert tu ky -> client connect bang
    # sslmode=require (postgres-js) / no-verify (pg) — xem .env duoi.
    # LUU Y: self-signed + require/no-verify = MA HOA duong truyen nhung
    # KHONG chong MITM (khong verify cert). Muon chong MITM: dung CERT
    # THAT cho db.dev.vfmgroup.vn (vd mount cert Let's Encrypt), roi ca 2
    # file .env dung ?sslmode=verify-full (system CA tin cert that).
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/certs/server.crt
      - -c
      - ssl_key_file=/certs/server.key
    ports:
      # Public TCP cho may dev (A-record db.dev.vfmgroup.vn -> IP).
      # Doi sang "55432:5432" neu muon ne scan port mac dinh.
      - "5432:5432"
    volumes:
      # PG 18+ luu data o /var/lib/postgresql/<major>/data — mount PARENT.
      - erp-pgdata:/var/lib/postgresql
      - pg-certs:/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp_framework"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s
    # --- (Tuy chon) ROLE APP NON-SUPERUSER, chat hon finding bao mat ---
    # Mac dinh dung `erp` (superuser) cho ca migrate + runtime cho gon.
    # Muon tach: them script vao /docker-entrypoint-initdb.d/ tao role
    # `erp_app` NOLOGIN-superuser + GRANT, dat runtime DATABASE_URL dung
    # erp_app, chi dung `erp` (superuser) cho lenh migrate.

  # ── Apache Tika (TUY CHON — KB trich van ban tu file) ───────
  # Ban SLIM (khong -full) -> nhe + it CVE parser hon. Can OCR anh/PDF
  # scan thi doi sang apache/tika:3.2.1.0-full. KHONG co auth -> dua
  # vao FIREWALL ALLOWLIST (xem header). Dev dat TIKA_URL=http://tika.dev.vfmgroup.vn:9998
  tika:
    image: apache/tika:3.2.1.0
    restart: unless-stopped
    # Mac dinh: port public + FIREWALL ALLOWLIST (xem header).
    # AN TOAN HON (khong mo gi ra Internet): doi "ports" -> expose: ["9998"]
    # va may dev noi qua SSH tunnel:
    #   ssh -L 9998:localhost:9998 user@<coolify-host>  ->  TIKA_URL=http://localhost:9998
    ports:
      - "9998:9998"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9998/tika"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── Ollama embedding (TUY CHON — KB vector search) ──────────
  # Bo neu dung embedding cloud (OpenAI). KHONG co auth -> dua vao
  # FIREWALL ALLOWLIST. Dev dat OLLAMA_EMBED_URL=http://ollama.dev.vfmgroup.vn:11434
  # Tag GHIM (tranh silent CVE rollback) — cap nhat ban moi da va CVE
  # (Probllama...) khi can, kiem tra tag tren hub.docker.com/r/ollama/ollama.
  # AN TOAN HON: nhu tika, doi "ports" -> expose: ["11434"] + SSH tunnel
  #   ssh -L 11434:localhost:11434 user@<coolify-host>  ->  OLLAMA_EMBED_URL=http://localhost:11434
  ollama:
    image: ollama/ollama:0.5.4
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Mot-lan: cho ollama san sang roi keo model nomic-embed-text (~275MB).
  ollama-pull:
    image: ollama/ollama:0.5.4
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - /bin/sh
      - -c
      - "until ollama list >/dev/null 2>&1; do echo 'cho ollama...'; sleep 2; done; ollama pull nomic-embed-text"
    restart: "no"

  # ── MQTT broker (TUY CHON — chi khi test IoT) — co mat khau ─
  # allow_anonymous=false + password_file sinh tu SERVICE_PASSWORD_64_MQTT.
  # Dev noi: MQTT_URL=mqtt://dev:<SERVICE_PASSWORD_64_MQTT>@mqtt.dev.vfmgroup.vn:1883
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    environment:
      MQTT_PASSWORD: ${SERVICE_PASSWORD_64_MQTT}
    entrypoint:
      - sh
      - -c
      - |
        mosquitto_passwd -b -c /mosquitto/config/passwd dev "$$MQTT_PASSWORD"
        cat > /mosquitto/config/mosquitto.conf <<'CONF'
        listener 1883 0.0.0.0
        allow_anonymous false
        password_file /mosquitto/config/passwd
        persistence true
        persistence_location /mosquitto/data/
        log_dest stdout
        log_type error
        log_type warning
        log_type notice
        CONF
        exec mosquitto -c /mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
    volumes:
      - mosquitto-data:/mosquitto/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "1883"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  erp-pgdata:
  pg-certs:
  ollama-data:
  mosquitto-data:
