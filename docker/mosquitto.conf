# Mosquitto MQTT broker — cấu hình MVP cho IoT bridge.
# MVP cho phép kết nối ẩn danh (allow_anonymous true). Broker KHÔNG
# expose ra Internet ở Coolify compose nên rủi ro thấp; với self-host
# có publish cổng ra LAN, cũng tạm ổn cho mạng nội bộ tin cậy.
# Production: bật auth — tạo password file bằng mosquitto_passwd và
# thay 2 dòng dưới bằng:
#   allow_anonymous false
#   password_file /mosquitto/config/passwd
listener 1883 0.0.0.0
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
