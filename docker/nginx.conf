# nginx cho ERP Framework SPA (self-host trong docker-compose).
# - /trpc → proxy sang container "server" (cùng origin → cookie-session OK,
#   không vướng CORS/SameSite cross-site).
# - SPA fallback: route khác → index.html (TanStack Router client-side).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # API backend — tên "server" do docker-compose DNS phân giải.
  location /trpc/ {
    proxy_pass http://server:8910;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Cho subscription/SSE nếu sau này dùng tRPC realtime.
    proxy_set_header Connection "";
    proxy_buffering off;
    # Codegen/classify gọi LLM (claude-cli ~150s) đi qua đây — nới timeout
    # lên 600s, nếu không nginx trả 504 HTML (60s mặc định) → client parse JSON lỗi.
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }

  # Agent chat SSE — proxy sang server, KHÔNG buffer để token chảy ngay.
  location /agent/ {
    proxy_pass http://server:8910;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 600s;
  }

  # Tải file lên Knowledge Base — proxy sang server. client_max_body_size
  # nới rộng cho file lớn (server giới hạn 25MB ở @fastify/multipart).
  location /upload {
    proxy_pass http://server:8910;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 30m;
  }

  # Feedback MCP (JSON-RPC) — cho AI ngoài (Claude) đọc phản hồi + ghi đề
  # xuất pending. Bảo vệ bằng header X-API-Key + scope feedback:read|propose
  # (deny-by-default, scope companyId). find_similar/cluster gọi embedding
  # LLM → nới timeout. location = /mcp (khớp đúng path, ưu tiên hơn SPA "/").
  location = /mcp {
    proxy_pass http://server:8910;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }

  # Errors MCP (JSON-RPC) — cho AI ngoai (Claude) doc loi runtime app gui
  # ve + doi trang thai / xoa loi. Bao ve bang X-API-Key + scope
  # errors:read|write (deny-by-default, scope companyId). location = /mcp/errors
  # (khop dung path, uu tien hon SPA "/").
  location = /mcp/errors {
    proxy_pass http://server:8910;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }

  # Migration MCP (JSON-RPC) — cho AI doc trang thai delta-sync, full-import
  # job, entity schema. Bao ve bang X-API-Key + scope migration:read.
  location = /mcp/migration {
    proxy_pass http://server:8910;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # CAD MCP (JSON-RPC) — may tram external (Claude Code + FreeCAD MCP local)
  # doc san pham/dinh muc + ghi ban ve "Ban ve AI" nguoc ve. Bao ve bang
  # X-API-Key + scope cad:read|write. cad_save_drawing upload artifact base64
  # (svg/step/stl/png) → client_max_body_size lon. location = /mcp/cad.
  location = /mcp/cad {
    proxy_pass http://server:8910;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 32m;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }

  # Backup MCP (JSON-RPC) — may offsite goi backup_info/list/run. Bao ve bang
  # X-API-Key + scope backup:read|run. location = /mcp/backup (khop dung path).
  location = /mcp/backup {
    proxy_pass http://server:8910;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # Backup STREAM tai dump DB + uploads (file LON, co the GB) — scope backup:full.
  # proxy_buffering off + temp_file_size 0: stream thang, KHONG buffer ca file vao
  # dia/RAM. timeout dai (dump lon mat thoi gian). Hai path GET rieng (khop dung).
  location = /mcp/backup/db {
    proxy_pass http://server:8910;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_max_temp_file_size 0;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
  location = /mcp/backup/uploads {
    proxy_pass http://server:8910;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_max_temp_file_size 0;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # REST API external (/api/v1/entities/.../records) — auth X-API-Key,
  # scope entity:<name>:read|write hoặc "*". Prefix khớp mọi path con.
  location /api/ {
    proxy_pass http://server:8910;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
  }

  # GraphQL (/graphql + /graphql/refresh) — typed schema per entity,
  # auth X-API-Key. Prefix khớp cả 2 path.
  location /graphql {
    proxy_pass http://server:8910;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
  }

  # Claude CLI Bridge — proxy nội bộ. Bridge KHÔNG expose ra Internet;
  # trình duyệt gọi /bridge/* (cùng origin) → nginx → bridge:8909.
  # Trong app → Cài đặt LLM, Bridge URL đặt là /bridge.
  location /bridge/ {
    proxy_pass http://bridge:8909/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 600s;
  }

  # Bản vẽ — API (/banvesvc/product, /resolve, /file). Prefix RIÊNG "/banvesvc"
  # (KHÔNG "/banve") để TRANG SPA /banve + /banve/ rơi về index.html, tránh
  # nginx route /banve/ về server gây 404. Auth session cookie (nginx forward
  # Cookie). read_timeout dài cho file PDF lớn.
  location /banvesvc/ {
    proxy_pass http://server:8910;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
  }

  # Module worker .mjs (vd pdf.worker cua pdfjs) — mime.types mac dinh cua nginx
  # KHONG co .mjs nen serve application/octet-stream → trinh duyet CHAN module
  # worker (strict MIME) → pdfjs chet ("Chua co ban ve"). Ep JS MIME. Regex
  # location uu tien hon prefix /assets/ nen bat duoc .mjs trong /assets/.
  location ~* \.mjs$ {
    default_type application/javascript;
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Asset có hash trong tên → cache lâu.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # index.html không cache → luôn lấy bản mới.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # SPA fallback — mọi path khác trả index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
