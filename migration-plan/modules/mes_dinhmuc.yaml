module: mes_dinhmuc
tables:
  - name: dbo.mes_dinhmuc_govan
    suggestedEntityName: dinh_muc_go_van
    primaryKey:
      - id
    columns:
      - name: id
        type: int
        isNullable: false
        mapTo:
          field: id
          entityType: number
          label: ID
          description: Khóa chính tự tăng.
          required: false
      - name: masp
        type: nvarchar
        isNullable: true
        mapTo:
          field: ma_san_pham
          entityType: relation
          relationEntity: san_pham
          label: Mã sản phẩm
          description: Mã sản phẩm nhà máy, liên kết tới entity sản phẩm.
          required: false
      - name: mact
        type: nvarchar
        isNullable: true
        mapTo:
          field: ma_chi_tiet
          entityType: text
          label: Mã chi tiết
          description: Mã cấu kiện (chi tiết) trong bộ sản phẩm.
          required: false
      - name: stt
        type: nvarchar
        isNullable: true
        mapTo:
          field: stt
          entityType: text
          label: Số thứ tự
          description: Mã vị trí/số thứ tự cấu kiện trong bộ sản phẩm (vd A00, A01, A02).
          required: false
      - name: chitiet
        type: nvarchar
        isNullable: true
        mapTo:
          field: chi_tiet
          entityType: text
          label: Chi tiết
          description: Tên mô tả cấu kiện (vd Chân, Thanh ngang trên, Khung tựa).
          required: false
      - name: nguyenlieu
        type: nvarchar
        isNullable: true
        mapTo:
          field: nguyen_lieu
          entityType: text
          label: Nguyên liệu
          description: Tên loại nguyên liệu gỗ dùng cho cấu kiện (vd THÔNG, SỒI).
          required: false
      - name: dayy_tc
        type: float
        isNullable: true
        mapTo:
          field: day_tinh_che
          entityType: number
          label: Dày tinh chế (mm)
          description: Chiều dày kích thước tinh chế — thành phẩm sau gia công, đơn vị mm.
          required: false
      - name: rong_tc
        type: float
        isNullable: true
        mapTo:
          field: rong_tinh_che
          entityType: number
          label: Rộng tinh chế (mm)
          description: Chiều rộng kích thước tinh chế, đơn vị mm.
          required: false
      - name: dai_tc
        type: float
        isNullable: true
        mapTo:
          field: dai_tinh_che
          entityType: number
          label: Dài tinh chế (mm)
          description: Chiều dài kích thước tinh chế, đơn vị mm.
          required: false
      - name: soluong_tc
        type: int
        isNullable: true
        mapTo:
          field: so_luong_tinh_che
          entityType: number
          label: Số lượng tinh chế
          description: Số lượng cấu kiện tinh chế cần cho 1 bộ sản phẩm.
          required: false
      - name: m3_tc
        type: float
        isNullable: true
        mapTo:
          field: m3_tinh_che
          entityType: number
          label: M³ tinh chế
          description: Thể tích gỗ tinh chế (m³), tính từ dày × rộng × dài × số lượng.
          required: false
      - name: m2_tc
        type: float
        isNullable: true
        mapTo:
          field: m2_tinh_che
          entityType: number
          label: M² tinh chế
          description: Diện tích bề mặt tinh chế (m²).
          required: false
      - name: dayy_sc
        type: float
        isNullable: true
        mapTo:
          field: day_so_che
          entityType: number
          label: Dày sơ chế (mm)
          description: Chiều dày kích thước sơ chế — phôi thô trước gia công, đơn vị mm.
          required: false
      - name: rong_sc
        type: float
        isNullable: true
        mapTo:
          field: rong_so_che
          entityType: number
          label: Rộng sơ chế (mm)
          description: Chiều rộng kích thước sơ chế, đơn vị mm.
          required: false
      - name: dai_sc
        type: float
        isNullable: true
        mapTo:
          field: dai_so_che
          entityType: number
          label: Dài sơ chế (mm)
          description: Chiều dài kích thước sơ chế, đơn vị mm.
          required: false
      - name: soluong_sc
        type: int
        isNullable: true
        mapTo:
          field: so_luong_so_che
          entityType: number
          label: Số lượng sơ chế
          description: Số lượng phôi sơ chế cần cắt để đủ số lượng tinh chế sau hao hụt.
          required: false
      - name: m3_sc
        type: float
        isNullable: true
        mapTo:
          field: m3_so_che
          entityType: number
          label: M³ sơ chế
          description: Thể tích gỗ sơ chế (m³), tính từ kích thước phôi × số lượng phôi.
          required: false
      - name: ghichu
        type: nvarchar
        isNullable: true
        mapTo:
          field: ghi_chu
          entityType: text
          label: Ghi chú
          description: Ghi chú gia công, mộng, xử lý đặc biệt của cấu kiện (vd Mộng 2 đầu, mỗi đầu 20mm).
          required: false
      - name: ngaytao
        type: datetime
        isNullable: true
        mapTo:
          field: thoi_gian_tao
          entityType: datetime
          label: Thời gian tạo
          description: Thời gian tạo bản ghi, hệ thống tự điền.
          required: false
      - name: nguoitao
        type: nvarchar
        isNullable: true
        mapTo:
          field: nguoi_tao
          entityType: text
          label: Người tạo
          description: Tên người nhập định mức.
          required: false
      - name: ngaysua
        type: datetime
        isNullable: true
        mapTo:
          field: thoi_gian_sua
          entityType: datetime
          label: Thời gian sửa
          description: Thời gian cập nhật gần nhất, hệ thống tự điền.
          required: false
      - name: nguoisua
        type: nvarchar
        isNullable: true
        mapTo:
          field: nguoi_sua
          entityType: text
          label: Người sửa
          description: Tên người cập nhật định mức gần nhất.
          required: false
      - name: hoanthanh
        type: bit
        isNullable: true
        mapTo:
          field: hoan_thanh
          entityType: boolean
          label: Hoàn thành
          description: Đánh dấu định mức cấu kiện đã được hoàn thiện và sẵn sàng phát hành sản xuất.
          required: false
      - name: mong1
        type: float
        isNullable: true
        mapTo:
          field: mong_1
          entityType: number
          label: Mộng đầu 1 (mm)
          description: Chiều dài mộng đầu thứ nhất của cấu kiện, đơn vị mm.
          required: false
      - name: mong2
        type: float
        isNullable: true
        mapTo:
          field: mong_2
          entityType: number
          label: Mộng đầu 2 (mm)
          description: Chiều dài mộng đầu thứ hai của cấu kiện, đơn vị mm.
          required: false
      - name: veneer_matchinh
        type: nvarchar
        isNullable: true
        mapTo:
          field: veneer_mat_chinh
          entityType: text
          label: Veneer mặt chính
          description: Loại hoặc mã veneer dán mặt chính của tấm gỗ.
          required: false
      - name: veneer_matphu
        type: nvarchar
        isNullable: true
        mapTo:
          field: veneer_mat_phu
          entityType: text
          label: Veneer mặt phụ
          description: Loại hoặc mã veneer dán mặt phụ (mặt sau) của tấm gỗ.
          required: false
      - name: veneer_dan_canh
        type: nvarchar
        isNullable: true
        mapTo:
          field: veneer_dan_canh
          entityType: text
          label: Veneer dán cạnh
          description: Loại hoặc mã veneer dán cạnh của tấm gỗ.
          required: false
      - name: uv_matchinh
        type: bit
        isNullable: true
        mapTo:
          field: uv_mat_chinh
          entityType: boolean
          label: UV mặt chính
          description: Có phủ UV trên mặt chính hay không.
          required: false
      - name: uv_matphu
        type: bit
        isNullable: true
        mapTo:
          field: uv_mat_phu
          entityType: boolean
          label: UV mặt phụ
          description: Có phủ UV trên mặt phụ hay không.
          required: false
      - name: uv_canhdai
        type: int
        isNullable: true
        mapTo:
          field: uv_canh_dai
          entityType: number
          label: UV cạnh dài
          description: Số lớp hoặc lần phủ UV trên cạnh dài.
          required: false
      - name: uv_canhngan
        type: int
        isNullable: true
        mapTo:
          field: uv_canh_ngan
          entityType: number
          label: UV cạnh ngắn
          description: Số lớp hoặc lần phủ UV trên cạnh ngắn.
          required: false
      - name: veneer_canhdai
        type: int
        isNullable: true
        mapTo:
          field: veneer_canh_dai
          entityType: number
          label: Veneer cạnh dài
          description: Số lớp hoặc quy cách veneer dán cạnh dài.
          required: false
      - name: veneer_canhngan
        type: int
        isNullable: true
        mapTo:
          field: veneer_canh_ngan
          entityType: number
          label: Veneer cạnh ngắn
          description: Số lớp hoặc quy cách veneer dán cạnh ngắn.
          required: false
      - name: id_nguyenlieu
        type: nvarchar
        isNullable: true
        mapTo:
          field: id_nguyen_lieu
          entityType: text
          label: Mã nguyên liệu
          description: Mã tra cứu nguyên liệu trong hệ thống (vd THONG, SOI).
          required: false
      - name: banve
        type: nvarchar
        isNullable: true
        mapTo:
          field: ban_ve
          entityType: text
          label: Bản vẽ
          description: Tên hoặc đường dẫn file bản vẽ kỹ thuật của cấu kiện.
          required: false
      - name: fsc_100
        type: bit
        isNullable: true
        mapTo:
          field: fsc_100
          entityType: boolean
          label: FSC 100%
          description: Nguyên liệu đạt chứng nhận FSC 100% (toàn bộ từ rừng được quản lý).
          required: false
      - name: fsc_mix
        type: bit
        isNullable: true
        mapTo:
          field: fsc_mix
          entityType: boolean
          label: FSC Mix
          description: Nguyên liệu đạt chứng nhận FSC Mix (pha trộn nguồn được chứng nhận và kiểm soát).
          required: false
      - name: fsc_cw
        type: bit
        isNullable: true
        mapTo:
          field: fsc_cw
          entityType: boolean
          label: FSC Controlled Wood
          description: Nguyên liệu đạt chứng nhận FSC Controlled Wood (gỗ nguồn kiểm soát).
          required: false
      - name: uv_matchinh1
        type: int
        isNullable: true
        mapTo:
          field: uv_mat_chinh_so_lan
          entityType: number
          label: UV mặt chính (số lần)
          description: Số lần phủ UV mặt chính (dạng số nguyên, bổ sung cho trường boolean uv_mat_chinh).
          required: false
      - name: uv_matphu1
        type: int
        isNullable: true
        mapTo:
          field: uv_mat_phu_so_lan
          entityType: number
          label: UV mặt phụ (số lần)
          description: Số lần phủ UV mặt phụ (dạng số nguyên).
          required: false
      - name: uv_canhngan1
        type: int
        isNullable: true
        mapTo:
          field: uv_canh_ngan_so_lan
          entityType: number
          label: UV cạnh ngắn (số lần)
          description: Số lần phủ UV cạnh ngắn (dạng số nguyên, bổ sung cho uv_canh_ngan).
          required: false
      - name: uv_canhdai1
        type: int
        isNullable: true
        mapTo:
          field: uv_canh_dai_so_lan
          entityType: number
          label: UV cạnh dài (số lần)
          description: Số lần phủ UV cạnh dài (dạng số nguyên, bổ sung cho uv_canh_dai).
          required: false
      - name: fsc_recycled
        type: bit
        isNullable: true
        mapTo:
          field: fsc_recycled
          entityType: boolean
          label: FSC Recycled
          description: Nguyên liệu đạt chứng nhận FSC Recycled (gỗ tái chế có chứng nhận).
          required: false
      - name: non_fsc
        type: bit
        isNullable: true
        mapTo:
          field: non_fsc
          entityType: boolean
          label: Non-FSC
          description: Nguyên liệu không có bất kỳ chứng nhận FSC nào.
          required: false
      - name: fsc_id
        type: int
        isNullable: true
        mapTo:
          field: fsc_id
          entityType: number
          label: ID chứng nhận FSC
          description: Mã số chứng nhận FSC liên kết với lô nguyên liệu.
          required: false
      - name: uv_code
        type: nvarchar
        isNullable: true
        mapTo:
          field: uv_code
          entityType: text
          label: Mã UV
          description: Mã quy trình phủ UV áp dụng cho cấu kiện.
          required: false
      - name: cnc_file
        type: nvarchar
        isNullable: true
        mapTo:
          field: cnc_file
