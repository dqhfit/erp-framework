          description: Tên hoặc đường dẫn file chương trình CNC gia công cấu kiện.
          required: false
      - name: dim_file
        type: nvarchar
        isNullable: true
        mapTo:
          field: dim_file
          entityType: text
          label: File kích thước
          description: Tên hoặc đường dẫn file kích thước chi tiết (dimension file).
          required: false
      - name: pcode
        type: nvarchar
        isNullable: true
        mapTo:
          field: pcode
          entityType: text
          label: Mã phôi
          description: Mã phôi (panel code) liên kết với quy hoạch cắt phôi.
          required: false
      - name: phoi_tructiep
        type: bit
        isNullable: true
        mapTo:
          field: phoi_truc_tiep
          entityType: boolean
          label: Phôi trực tiếp
          description: Đánh dấu cấu kiện được cắt trực tiếp từ phôi, không qua bước sơ chế riêng.
          required: false
    inferredRelations:
      - column: masp
        refTable: b
        refColumn: masp_nhamay
        sourceProc: dbo.mes_dinhmuc_govan_create
      - column: masp
        refTable: dbo.tr_baogia3_govan
        refColumn: masp
        sourceProc: dbo.tr_baogia3_govan_create
    label: Định mức gỗ ván
    description: Định mức (BOM) chi tiết cấu kiện gỗ ván cho từng sản phẩm. Mỗi dòng là 1 cấu kiện với kích thước tinh chế, sơ chế và thông tin veneer/UV/FSC.
    suggestedKind: entity
